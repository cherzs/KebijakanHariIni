services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kawalkebijakan
      POSTGRES_USER: kawal
      POSTGRES_PASSWORD: kawaldev123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kawal -d kawalkebijakan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: